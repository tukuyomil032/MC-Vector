name: E2E

on:
  pull_request:
    paths:
      - "src/**"
      - "src-tauri/**"
      - "e2e/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/e2e.yml"
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    name: Tauri WebDriver E2E (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
      - name: Install all dependencies
        run: pnpm install --frozen-lockfile
      - name: Install tauri-driver
        run: cargo install tauri-driver --locked
      - name: Verify tauri-driver installation
        run: |
          which tauri-driver || echo "tauri-driver not in PATH"
          ls -la ~/.cargo/bin/tauri-driver || echo "tauri-driver binary not found at ~/.cargo/bin"
      - name: Enable safaridriver (macOS)
        if: matrix.platform == 'macos-latest'
        run: sudo safaridriver --enable
      - name: Install Microsoft Edge Driver (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          cargo install --git https://github.com/chippers/msedgedriver-tool
          & "$HOME/.cargo/bin/msedgedriver-tool.exe"
          $PWD.Path >> $env:GITHUB_PATH
      - name: Run E2E tests
        run: pnpm test:e2e
      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts-${{ matrix.platform }}
          path: |
            e2e/artifacts
            src-tauri/target/debug/*.log
