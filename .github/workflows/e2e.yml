name: E2E

on:
  pull_request:
    paths:
      - "src/**"
      - "src-tauri/**"
      - "e2e/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/e2e.yml"
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    name: Tauri WebDriver E2E (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
      - name: Install all dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Linux dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            webkit2gtk-driver \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            xvfb \
            at-spi2-core \
            dbus-x11
      - name: Install tauri-driver
        run: cargo install tauri-driver --locked
      - name: Verify tauri-driver installation
        shell: bash
        run: |
          which tauri-driver || echo "tauri-driver not in PATH"
          ls -la ~/.cargo/bin/tauri-driver || echo "tauri-driver binary not found at ~/.cargo/bin"
      - name: Set WebKit headless env (Ubuntu)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          echo "WEBKIT_DISABLE_COMPOSITING_MODE=1" >> $GITHUB_ENV
          echo "WEBKIT_DISABLE_DMABUF_RENDERER=1" >> $GITHUB_ENV
          echo "LIBGL_ALWAYS_SOFTWARE=1" >> $GITHUB_ENV
      - name: Install Microsoft Edge Driver (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          cargo install --git https://github.com/chippers/msedgedriver-tool
          & "$HOME/.cargo/bin/msedgedriver-tool.exe"
          $PWD.Path >> $env:GITHUB_PATH
      - name: Pre-build Tauri app
        run: pnpm exec tauri build --debug --no-bundle
      - name: Run E2E tests
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "ubuntu-latest" ]; then
            dbus-run-session -- xvfb-run -a -s "-screen 0 1920x1080x24" pnpm test:e2e
          else
            pnpm test:e2e
          fi
      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts-${{ matrix.platform }}
          path: |
            e2e/artifacts
            src-tauri/target/debug/*.log
