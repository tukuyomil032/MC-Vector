pre-commit:
  commands:
    lint-format-ts:
      glob: 'src/**/*.{ts,tsx}'
      run: pnpm check:fix
      stage_fixed: true
    fmt-rust:
      glob: 'src-tauri/src/**/*.rs'
      run: cargo fmt --all --manifest-path src-tauri/Cargo.toml
      stage_fixed: true
    lint-format-docs:
      glob: 'docs/src/**/*.{ts,mjs}'
      run: pnpm --filter @mc-vector/docs check:fix
      stage_fixed: true
